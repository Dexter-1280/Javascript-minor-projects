<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Integration Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f4f4f9;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 4px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #0056b3;
    }
    pre {
      background: #272822;
      color: #f8f8f2;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>1. Button Click Interaction</h2>
    <p>Click the button below to trigger the local DOM event listener.</p>
    <button id="myButton">Click me</button>
  </div>


  <div class="card">
    <h2>2. Array Filter Results</h2>
    <p>Premium electronics (> $500) filtered from array:</p>
    <pre id="arrayOutput">Processing data...</pre>
  </div>


  <div class="card">
    <h2>3. GitHub API Live Fetch</h2>
    <p>Live data fetched asynchronously from GitHub's server:</p>
    <pre id="apiOutput">Fetching live data...</pre>
  </div>

  <script>
  
    const button = document.getElementById('myButton');
    button.addEventListener('click', () => {
      button.textContent = 'Clicked! ✅';
      button.style.backgroundColor = '#4CAF50';
    });

  
    const products = [
      { name: 'Laptop', price: 1200, category: 'Electronics' },
      { name: 'Shirt', price: 25, category: 'Clothing' },
      { name: 'Phone', price: 800, category: 'Electronics' }
    ];

    const premiumElectronics = products
      .filter(item => item.category === 'Electronics' && item.price > 500)
      .map(item => item.name);

    document.getElementById('arrayOutput').textContent = JSON.stringify(premiumElectronics);

    
    async function fetchData() {
      try {
        const response = await fetch('https://github.com');
        const data = await response.json();
        
        const displayData = {
          login: data.login,
          name: data.name,
          public_repos: data.public_repos,
          html_url: data.html_url
        };
        
        document.getElementById('apiOutput').textContent = JSON.stringify(displayData, null, 2);
      } catch (error) {
        document.getElementById('apiOutput').textContent = 'Error fetching data: ' + error.message;
        console.error('Error fetching data:', error);
      }
    }

    fetchData();
  </script>
</body>
</html>
