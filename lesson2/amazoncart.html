<!DOCTYPE html>
<html>

<head>
  <title>Cart Quantity</title>
</head>

<body>

  <button onclick="displayQuantity();">Show Quantity</button>

  <button class="addbutton" onclick="
  addbutton();
        cartQuantity++;
        displayQuantity();
    ">Add to Cart</button>

  <button onclick="
        cartQuantity += 2;
        displayQuantity();
    ">+2</button>

  <button onclick="
        cartQuantity += 3;
        displayQuantity();
    ">+3</button>

  <button onclick="
        cartQuantity += 4;
        displayQuantity();
    ">+4</button>

  <button onclick="
        cartQuantity += 5;
        displayQuantity();
    ">+5</button>

  <button onclick="
        cartQuantity = 0;
        displayQuantity();
    ">Remove from cart</button>

  <button onclick="
        cartQuantity -= 2;
        displayQuantity();
    ">-2</button>

  <button onclick="
        cartQuantity -= 3;
        displayQuantity();
    ">-3</button>

  <p class="js-quantity"></p>

  <script>
    let cartQuantity = 0;

    function displayQuantity() {
      document.querySelector('.js-quantity')
        .innerHTML = `Cart quantity: ${cartQuantity}`;
    }

    displayQuantity();

    function addbutton(){
let add=document.querySelector('.addbutton');
if(add.innerText='Add to cart'){
  add.innerText='Added to cart';
}
else{
  add.innerText='Add to cart'
}
    
   setTimeout(() => {
    add.innerText="Add to cart";
  }, 3000);
  };
  </script>

</body>

</html>
